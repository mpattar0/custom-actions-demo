name: "Get & Cache Dependencies"
description: "Action to get and cache dependencies for a project"
inputs:
  caching:
    description: "Enable or disable caching of dependencies"
    required: false
    default: "true"
outputs:
  used-cache:
    description: "Whether the cache was used"
    value: ${{ steps.set-output.outputs.used-cache }}
runs:
  using: "composite"
  steps:
    - name: Get & Cache Dependencies
      if: inputs.caching == 'true'
      id: cache
      uses: actions/cache@v4
      with:
        path: node_modules
        key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
    - name: Install dependencies
      if: steps.cache.outputs.cache-hit != 'true' || inputs.caching != 'true'
      run: npm ci
      shell: bash
    - name: Set output
      id: set-output
      run: echo "used-cache=${{ steps.cache.outputs.cache-hit || 'false' }}" >> $GITHUB_OUTPUT
      shell: bash
