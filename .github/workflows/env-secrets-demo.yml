name: Environment Secrets Demo

on:
    workflow_dispatch:
        inputs:
            environment:
                description: "Target environment"
                required: true
                type: choice
                options:
                    - dev
                    - staging
                    - production

jobs:
    deploy-dev:
        name: Deploy to Dev
        runs-on: ubuntu-latest
        if: ${{ inputs.environment == 'dev' }}
        environment: dev # ← links to "dev" environment in repo settings
        steps:
            - name: Show environment name
              run: echo "Deploying to environment => ${{ vars.ENV_NAME }}"

            - name: Use env-specific secret
              run: |
                  echo "DB_HOST is set: ${{ secrets.DB_HOST != '' }}"
                  echo "API_KEY is set: ${{ secrets.API_KEY != '' }}"
              # secrets.DB_HOST and secrets.API_KEY are scoped to the "dev" environment
              # They are NOT accessible outside this job because environment: dev is set here

    deploy-staging:
        name: Deploy to Staging
        runs-on: ubuntu-latest
        if: ${{ inputs.environment == 'staging' }}
        environment: staging # ← links to "staging" environment in repo settings
        steps:
            - name: Show environment name
              run: echo "Deploying to environment => ${{ vars.ENV_NAME }}"

            - name: Use env-specific secret
              run: |
                  echo "DB_HOST is set: ${{ secrets.DB_HOST != '' }}"
                  echo "API_KEY is set: ${{ secrets.API_KEY != '' }}"
              # secrets.DB_HOST and secrets.API_KEY here are the STAGING versions
              # Different values than the dev environment secrets with the same name

    deploy-production:
        name: Deploy to Production
        runs-on: ubuntu-latest
        if: ${{ inputs.environment == 'production' }}
        environment: production # ← links to "production" environment in repo settings
        # Production environments can have required reviewers / wait timers configured
        steps:
            - name: Show environment name
              run: echo "Deploying to environment => ${{ vars.ENV_NAME }}"

            - name: Use env-specific secret
              run: |
                  echo "DB_HOST is set: ${{ secrets.DB_HOST != '' }}"
                  echo "API_KEY is set: ${{ secrets.API_KEY != '' }}"
              # secrets.DB_HOST and secrets.API_KEY here are the PRODUCTION versions

            - name: Deploy using production secrets
              env:
                  # Map the secret to a local env var so it's not exposed in logs
                  DB_CONNECTION: ${{ secrets.DB_HOST }}
                  API_TOKEN: ${{ secrets.API_KEY }}
              run: |
                  echo "Running deployment script..."
                  # Your real deploy script would use $DB_CONNECTION and $API_TOKEN here
                  echo "Deploy complete for production!"
