name: "demo"
on: [ workflow_dispatch ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout
      - name: install nodejs
        uses: actions/setup-node@v2
        with:
          node-version: 18
      - name: Install dependencies
        run: |
          npm ci
          npm run build
      - name: GitHub Repo
        run: |
          echo $GITHUB_REPOSITORY
